name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install bot dependencies
        run: npm ci

      - name: Run bot tests
        run: npm test

      - name: Install Worker dependencies
        run: npm --prefix workers/discord-bot ci

      - name: Check Worker build
        run: npm --prefix workers/discord-bot run check
