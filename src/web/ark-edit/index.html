<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARK設定編集</title>
    <link rel="stylesheet" href="/ark-edit/app.css">
</head>
<body>
    <main class="page">
        <section id="loadingView" class="panel state-panel">
            <p class="eyebrow">ARK</p>
            <h1>設定を読み込んでいます</h1>
        </section>

        <section id="errorView" class="panel state-panel hidden">
            <p class="eyebrow">ARK</p>
            <h1>開けませんでした</h1>
            <p id="errorText" class="muted"></p>
        </section>

        <section id="completeView" class="panel state-panel hidden">
            <p class="eyebrow">ARK</p>
            <h1>変更を保存しました</h1>
            <p class="muted">この画面は閉じてください。</p>
            <div id="completeSummary" class="complete-summary"></div>
        </section>

        <form id="settingsForm" class="hidden">
            <header class="page-header">
                <div>
                    <p class="eyebrow">ARK</p>
                    <h1>サーバー設定</h1>
                </div>
                <div class="status-stack">
                    <span id="serverName" class="badge"></span>
                    <span id="playerCount" class="badge"></span>
                </div>
            </header>

            <section class="panel">
                <div class="section-header">
                    <div>
                        <h2>MAP</h2>
                        <p id="currentMapText" class="muted"></p>
                    </div>
                </div>
                <label class="field">
                    <span>変更後のMAP</span>
                    <select id="mapSelect"></select>
                </label>
            </section>

            <section class="panel">
                <div class="section-header">
                    <div>
                        <h2>CurseForge MOD</h2>
                        <p class="muted">MOD IDを追加・削除できます。</p>
                    </div>
                    <span id="modCount" class="count"></span>
                </div>

                <div class="mod-add-row">
                    <input id="modInput" type="text" inputmode="numeric" placeholder="MOD IDを入力">
                    <button id="addModButton" type="button" class="secondary-button">追加</button>
                </div>

                <div id="modList" class="mod-list"></div>

                <div class="mod-links">
                    <a id="modCatalogLink" class="link-button" href="https://www.curseforge.com/ark-survival-ascended/search?class=mods" target="_blank" rel="noreferrer">
                        CurseForgeのMOD一覧を開く
                    </a>
                </div>
            </section>

            <section class="actions">
                <button id="saveButton" type="submit" class="primary-button">変更を保存</button>
                <p id="notice" class="notice"></p>
            </section>

            <section class="panel history-panel">
                <div class="section-header">
                    <h2>変更履歴</h2>
                </div>
                <div id="historyList" class="history-list"></div>
            </section>
        </form>
    </main>

    <dialog id="modErrorDialog" class="confirm-dialog">
        <div class="confirm-card">
            <p class="eyebrow">MOD追加</p>
            <h2>MODを追加できませんでした</h2>
            <p id="modErrorText" class="muted"></p>
            <div class="dialog-actions">
                <button id="closeModErrorButton" type="button" class="secondary-button">閉じる</button>
            </div>
        </div>
    </dialog>

    <dialog id="removeModDialog" class="confirm-dialog">
        <div class="confirm-card">
            <p class="eyebrow">MOD削除</p>
            <h2>このMODを削除しますか？</h2>
            <p id="removeModText" class="muted"></p>
            <div class="dialog-actions">
                <button id="cancelRemoveButton" type="button" class="secondary-button">キャンセル</button>
                <button id="confirmRemoveButton" type="button" class="danger-button">削除</button>
            </div>
        </div>
    </dialog>

    <script src="/ark-edit/app.js" type="module"></script>
</body>
</html>
