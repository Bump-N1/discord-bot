<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PoE2 相場設定 | discord-bot</title>
    <link rel="icon" type="image/svg+xml" href="/act/favicon.svg">
    <link rel="stylesheet" href="/poe2-market/app.css">
</head>
<body>
    <header class="app-header">
        <button id="categoryToggle" class="category-menu-button" type="button" aria-label="カテゴリーを開く" aria-expanded="false" aria-controls="categoryTabs">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="header-title">
            <p class="brand-label">PoE2</p>
            <h1>相場の表示アイテム</h1>
        </div>
        <span id="leagueBadge" class="league-badge"></span>
    </header>
    <div id="categoryBackdrop" class="category-backdrop" hidden></div>

    <main class="layout">
        <section id="loadingView" class="state-view">
            <p>読み込み中...</p>
        </section>

        <section id="errorView" class="state-view hidden">
            <h2>開けませんでした</h2>
            <p id="errorText"></p>
        </section>

        <form id="settingsForm" class="hidden">
            <section class="setting-panel" aria-label="投稿設定">
                <div class="settings-row">
                    <h2>投稿設定</h2>
                    <label class="interval-control">
                        <select id="postIntervalHours" name="postIntervalHours" aria-label="投稿頻度"></select>
                        <span class="interval-unit">時間ごと</span>
                    </label>
                </div>
            </section>

            <div class="market-editor">
                <aside class="category-sidebar" aria-label="カテゴリー">
                    <div id="categoryTabs" class="category-tabs" role="tablist" aria-label="カテゴリー"></div>
                </aside>

                <section class="selection-panel" aria-label="表示アイテム">
                    <div class="panel-header">
                        <h2>表示アイテム</h2>
                        <span id="selectedCount" class="selected-count"></span>
                    </div>
                    <div id="productList" class="product-list"></div>
                </section>
            </div>

            <div class="bottom-controls">
                <label class="search-field">
                    <span class="sr-only">アイテムを検索</span>
                    <input id="searchInput" type="search" autocomplete="off" placeholder="キーワードを入力してください...">
                </label>
                <div class="actions">
                    <button id="saveButton" class="primary" type="submit">設定を保存</button>
                </div>
            </div>

            <section class="history-panel" aria-label="保存履歴">
                <div class="panel-header">
                    <h2>最近の保存履歴</h2>
                </div>
                <div id="historyList" class="history-list"></div>
            </section>
        </form>
    </main>

    <div id="notice" class="notice hidden" role="status"></div>
    <script src="/poe2-market/app.js" type="module"></script>
</body>
</html>
